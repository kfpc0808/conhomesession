<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>디지털 오피스 설명회 초대</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    height: 100dvh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #d5d5d5;
  }

  .card {
    width: 100%;
    max-width: 440px;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    background: #f3f3f3;
    position: relative;
    overflow: hidden;
  }

  /* ── Top Bar ── */
  .top-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 24px 0;
    flex-shrink: 0;
  }

  .company-mark {
    font-size: 10px;
    font-weight: 500;
    color: #999;
    letter-spacing: 2.5px;
  }

  .badge {
    font-size: 9px;
    font-weight: 700;
    color: #fff;
    letter-spacing: 2px;
    background: #c02030;
    padding: 4px 12px;
    border-radius: 2px;
  }

  /* ── Hero ── */
  .hero {
    padding: 28px 24px 0;
    flex-shrink: 0;
  }

  .hero-sub {
    font-size: 11px;
    font-weight: 500;
    color: #c02030;
    letter-spacing: 4px;
    margin-bottom: 10px;
  }

  .hero-title {
    font-family: 'Playfair Display', serif;
    font-size: 34px;
    font-weight: 700;
    color: #1a1a1a;
    line-height: 1.12;
    margin-bottom: 6px;
  }

  .hero-ko {
    font-size: 18px;
    font-weight: 300;
    color: #555;
    letter-spacing: 2px;
  }

  /* ── Divider ── */
  .divider {
    margin: 20px 24px;
    height: 2px;
    background: #1a1a1a;
    flex-shrink: 0;
    position: relative;
  }

  .divider::after {
    content: '';
    position: absolute;
    left: 0; top: 0;
    width: 48px; height: 2px;
    background: #c02030;
  }

  /* ── Content ── */
  .content {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 0 24px;
    gap: 16px;
  }

  .invite-msg {
    font-size: 13.5px;
    line-height: 1.9;
    color: #555;
    word-break: keep-all;
  }

  .invite-msg strong {
    color: #1a1a1a;
    font-weight: 700;
  }

  /* ── Benefit ── */
  .benefit-box {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: #1a1a1a;
    border-radius: 6px;
  }

  .benefit-box .year {
    font-family: 'Playfair Display', serif;
    font-size: 32px;
    font-weight: 700;
    color: #c02030;
    line-height: 1;
  }

  .benefit-box .year small {
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 12px;
    font-weight: 400;
    color: #e05060;
  }

  .benefit-box .desc {
    font-size: 13px;
    color: rgba(255,255,255,0.6);
    line-height: 1.55;
  }

  .benefit-box .desc b {
    color: #fff;
    font-weight: 700;
  }

  /* ── Details Grid ── */
  .details {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
  }

  .detail-item {
    padding: 11px 14px;
    background: #fff;
    border-radius: 6px;
  }

  .detail-item.full {
    grid-column: 1 / -1;
  }

  .detail-label {
    font-size: 9px;
    font-weight: 700;
    color: #c02030;
    letter-spacing: 1.5px;
    margin-bottom: 4px;
  }

  .detail-value {
    font-size: 13.5px;
    font-weight: 600;
    color: #1a1a1a;
    line-height: 1.4;
  }

  .detail-value small {
    font-size: 10.5px;
    font-weight: 400;
    color: #999;
  }

  /* ── CTA ── */
  .cta-wrap {
    text-align: center;
    padding-top: 2px;
  }

  @keyframes goldGlow {
    0%, 100% {
      box-shadow: 
        0 0 8px rgba(201,162,39,0.3),
        0 0 20px rgba(201,162,39,0.1),
        inset 0 0 0 1.5px #c9a227;
    }
    50% {
      box-shadow: 
        0 0 16px rgba(201,162,39,0.5),
        0 0 36px rgba(201,162,39,0.2),
        inset 0 0 0 1.5px #e8d48b;
    }
  }

  @keyframes shimmer {
    0% { background-position: -200% center; }
    100% { background-position: 200% center; }
  }

  .cta-btn {
    display: inline-block;
    background: #c02030;
    color: #fff;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 13px 56px;
    border-radius: 4px;
    text-decoration: none;
    letter-spacing: 2px;
    border: 2px solid #c9a227;
    animation: goldGlow 2s ease-in-out infinite;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
  }

  .cta-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(
      105deg,
      transparent 30%,
      rgba(232,212,139,0.25) 45%,
      rgba(232,212,139,0.4) 50%,
      rgba(232,212,139,0.25) 55%,
      transparent 70%
    );
    background-size: 200% 100%;
    animation: shimmer 2.5s ease-in-out infinite;
    pointer-events: none;
  }

  .cta-btn:hover {
    background: #d4283a;
    border-color: #e8d48b;
  }

  /* ── Bottom ── */
  .bottom-bar {
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    flex-shrink: 0;
    border-top: 1px solid #e0e0e0;
    margin: 0 24px;
    padding: 16px 0;
  }

  .closing {
    font-size: 11px;
    color: #999;
    line-height: 1.65;
    word-break: keep-all;
  }

  .logo-area {
    text-align: right;
  }

  .logo-area .name {
    font-size: 11px;
    font-weight: 700;
    color: #1a1a1a;
    letter-spacing: 0.5px;
  }

  .logo-area .sub {
    font-size: 8px;
    color: #aaa;
    letter-spacing: 1px;
    margin-top: 1px;
  }

  /* ── Desktop ── */
  @media (min-width: 481px) {
    .card {
      height: 780px;
      border-radius: 12px;
      box-shadow: 0 12px 48px rgba(0,0,0,0.1);
    }
  }

  /* ── Small phones ── */
  @media (max-height: 680px) {
    .hero { padding-top: 20px; }
    .hero-title { font-size: 28px; }
    .divider { margin: 14px 24px; }
    .content { gap: 12px; }
    .benefit-box { padding: 10px 14px; }
    .benefit-box .year { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="card">

  <!-- Top Bar -->
  <div class="top-bar">
    <div class="company-mark">KFPC</div>
    <div class="badge">LEADERS ONLY</div>
  </div>

  <!-- Hero -->
  <div class="hero">
    <div class="hero-sub">개인 맞춤형</div>
    <div class="hero-title">Digital Office</div>
    <div class="hero-ko">설명회</div>
  </div>

  <div class="divider"></div>

  <!-- Content -->
  <div class="content">

    <p class="invite-msg">
      고객에게 <strong>신뢰와 전문성</strong>을 어필할 수 있는<br>
      <strong>컨설턴트 전용</strong> 오픈세션에 초대합니다.
    </p>

    <div class="benefit-box">
      <div class="year">1<small>년</small></div>
      <div class="desc">참석 리더님께<br><b>시스템 무료</b> 제공</div>
    </div>

    <!-- Details Grid -->
    <div class="details">
      <div class="detail-item full">
        <div class="detail-label">일정</div>
        <div class="detail-value">3.12 — 3.18 <small>&nbsp;90분 · 링크 참조</small></div>
      </div>
      <div class="detail-item">
        <div class="detail-label">장소</div>
        <div class="detail-value">한국FP센터 본사<br><small>서울 송파</small></div>
      </div>
      <div class="detail-item">
        <div class="detail-label">주차</div>
        <div class="detail-value">가능<br><small>건물 내 지하주차장</small></div>
      </div>
    </div>

    <!-- CTA -->
    <div class="cta-wrap">
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSdmqnkB0e7SWbr_ebj2RZMoW1PkuPIY0Z9_cAPHEafZr_WQxg/viewform" class="cta-btn">신청하기</a>
    </div>

  </div>

  <!-- Bottom -->
  <div class="bottom-bar">
    <div class="closing">함께하셔서 한 단계 더<br>성장하는 기회를 잡아보세요.</div>
    <div class="logo-area">
      <div class="name">(주)한국FP센터</div>
      <div class="sub">KOREA FP CENTER</div>
    </div>
  </div>

</div>

</body>
</html>
